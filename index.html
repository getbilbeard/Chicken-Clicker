<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Egg Empire</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-container">
        <!-- Game title header -->
        <div class="header">
            <h1>Egg Empire</h1>
        </div>

        <!-- Stat displays -->
        <div class="stats-display">
            <div class="stat">
                Eggs
                <div id="eggs-display" class="stat-value">0</div>
            </div>
            <div class="stat">
                Eggs Per Second
                <div id="eps-display" class="stat-value">0</div>
            </div>
            <div class="stat">
                Eggs Per Click
                <div id="epc-display" class="stat-value">0</div>
            </div>
        </div>

        <!-- Main clicker area -->
        <div class="chicken-area">
            <button id="chicken-button" class="chicken-button">
                &#128020; <!-- Chicken emoji -->
            </button>
            <p>Tap the chicken to lay eggs!</p>
        </div>

        <!-- Producers section -->
        <div class="producers-grid" id="producers-container">
            <!-- Producer items will be dynamically added here -->
        </div>

        <!-- Zone progression section -->
        <div class="zone-progress">
            <h2>Current Zone: <span id="current-zone">Backyard Coop</span></h2>
            <p>Next Zone: <span id="next-zone">County Farm</span> at <span id="next-zone-milestone">100 eggs</span></p>
        </div>

        <!-- Prestige section -->
        <div class="prestige-section">
            <h2>Prestige</h2>
            <p id="prestige-info">Reach 1,000,000,000 total eggs to prestige and earn Golden Feathers!</p>
            <p>Golden Feathers: <span id="feather-count">0</span> (+<span id="feather-multiplier">0</span>% bonus)</p>
            <button id="prestige-button" class="prestige-button" disabled>Prestige!</button>
        </div>
    </div>
    
    <!-- Custom message box for in-game notifications -->
    <div id="message-box" class="message-box"></div>

    <script src="game.js"></script>
</body>
</html>
